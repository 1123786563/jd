# 状态定义:
# ==================
# Epic 状态:
#   - backlog: Epic 尚未开始
#   - in-progress: Epic 正在积极开发中
#   - done: Epic 中的所有 Story 均已完成
#
# Epic 状态流转:
#   - backlog → in-progress: 创建第一个 Story 时自动流转 (通过 create-story)
#   - in-progress → done: 当所有 Story 达到 'done' 状态时手动流转
#
# Story 状态:
#   - backlog: Story 仅存在于 Epic 文件中
#   - ready-for-dev: 已在 stories 文件夹中创建 Story 文件
#   - in-progress: 开发人员正在积极实施
#   - review: 准备代码审查 (通过 Dev 的 code-review 工作流)
#   - done: Story 已完成
#
# 追溯 (Retrospective) 状态:
#   - optional: 可选完成，非强制要求
#   - done: 追溯已完成
#
# 工作流说明:
# ===============
# - 当创建第一个 Story 时，Epic 会自动流转为 'in-progress'
# - 如果团队能力允许，Story 可以并行开发
# - SM 通常在前一个 Story 'done' 后创建下一个 Story，以便纳入习得的经验
# - Dev 将 Story 移至 'review'，然后运行 code-review (推荐使用不同的 LLM)

